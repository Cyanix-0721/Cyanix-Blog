<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    /* 默认：浅色模式 - 使用边框，不填满背景 */
    #bg {
      fill: none;
      stroke: #39c5bb;
      stroke-width: 8;
    }

    #txt {
      fill: #39c5bb;
    }

    /* 深色模式适配 - 保持原样或去掉边框 */
    @media (prefers-color-scheme: dark) {
      #bg {
        stroke: none;
      }

      #txt {
        fill: #39c5bb;
      }
    }
  </style>
  <rect id="bg" x="4" y="4" width="92" height="92" rx="20"></rect><text id="txt" x="50" y="56" text-anchor="middle"
    dominant-baseline="central" font-family="monospace" font-size="55" font-weight="bold">&gt;_</text>
  <style>
    @media (prefers-color-scheme: light) {
      :root {
        filter: none;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        filter: none;
      }
    }
  </style>
</svg>